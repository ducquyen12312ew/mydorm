<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#922b21"/>
    </linearGradient>
  </defs>
  <!-- Background square with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Building silhouette -->
  <rect x="156" y="200" width="200" height="220" rx="8" fill="rgba(255,255,255,0.15)"/>
  <!-- Door -->
  <rect x="220" y="340" width="72" height="80" rx="6" fill="rgba(255,255,255,0.25)"/>
  <!-- Windows row 1 -->
  <rect x="172" y="220" width="44" height="36" rx="4" fill="rgba(255,255,255,0.85)"/>
  <rect x="234" y="220" width="44" height="36" rx="4" fill="rgba(255,255,255,0.85)"/>
  <rect x="296" y="220" width="44" height="36" rx="4" fill="rgba(255,255,255,0.85)"/>
  <!-- Windows row 2 -->
  <rect x="172" y="278" width="44" height="36" rx="4" fill="rgba(255,255,255,0.85)"/>
  <rect x="296" y="278" width="44" height="36" rx="4" fill="rgba(255,255,255,0.85)"/>
  <!-- Roof triangle -->
  <polygon points="136,204 256,108 376,204" fill="rgba(255,255,255,0.9)"/>
  <!-- "e" lettermark at bottom -->
  <text x="256" y="468" font-family="'Helvetica Neue',Arial,sans-serif" font-size="64" font-weight="800"
        fill="white" text-anchor="middle" opacity="0.95">eDorm</text>
</svg>
